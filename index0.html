<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Project Journey Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="container">

<header>

    <h1>AI-Based Crime Pattern Analysis</h1>

    <p>Project Journey Dashboard</p>

</header>

<section class="overview">

    <div class="overview-card">

        <h3>Overall Progress</h3>

        <div class="main-progress">
            <div id="overallFill"></div>
        </div>

        <span id="overallPercent">0%</span>

    </div>

    <div class="overview-card">

        <h3>Current Phase</h3>

        <h2 id="currentPhase">Loading...</h2>

    </div>

</section>

<section class="timeline-wrapper">

    <div id="timeline"></div>

</section>

<section id="details">

    <div class="placeholder">

        Select a milestone to view details

    </div>

</section>

<section class="pipeline-section">

    <h2>Project Pipeline Status</h2>

    <div class="pipeline-legend">

        <span class="legend-item">
            🟢 Completed
        </span>

        <span class="legend-item">
            🟡 In Progress
        </span>

        <span class="legend-item">
            ⚪ Pending
        </span>

        <span class="legend-item">
            🔴 Blocked
        </span>

    </div>

    <div id="pipelineGrid"></div>

</section>

<div id="pipelineDetails">

    <div class="placeholder">

        Select a pipeline stage to view details

    </div>

</div>

</div>

<footer>
    &copy; 2026 utkarshpandey.com
</footer>

<script src="app.js"></script>

</body>
</html>
